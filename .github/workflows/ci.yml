name: CI/CD Pipeline

on:
  push:
    branches: [feat/*, fix/*]
  pull_request:
    branches: [main, dev]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'
  TZ: 'UTC'
  LANG: 'en_US.UTF-8'
  LC_ALL: 'en_US.UTF-8'

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Run the unit-test suite and gate progression on an 85% pass rate.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (>= 85% pass rate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Pre-create build directory
        # `tee` and surefire need target/ to exist before they can write
        # anything. Doing this up-front guarantees the log + report paths
        # are valid even if mvnw fails before reaching the test phase.
        run: mkdir -p target

      - name: Run tests
        id: run-tests
        # Use `|| true` so the parse/upload steps still execute even when
        # individual test cases fail. The pass-rate gate is enforced in the
        # next step instead of relying on Maven's exit code alone.
        run: |
          ./mvnw test -B -DfailIfNoTests=false \
            > target/test-output.log 2>&1 \
            || echo "Maven exited non-zero (test failures expected); continuing to parse reports."
        env:
          TZ: 'UTC'

      - name: Parse surefire XML reports
        id: parse
        if: always()
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os, sys, glob, xml.etree.ElementTree as ET

          reports = sorted(glob.glob('target/surefire-reports/TEST-*.xml'))
          if not reports:
              print('::error::No surefire XML reports were generated. '
                    'Check target/test-output.log for the underlying Maven error.',
                    file=sys.stderr)
              sys.exit(1)

          total = failures = errors = skipped = 0
          for path in reports:
              root = ET.parse(path).getroot()
              total   += int(root.get('tests',   0))
              failures += int(root.get('failures', 0))
              errors   += int(root.get('errors',  0))
              skipped  += int(root.get('skipped', 0))

          # Effective count excludes skipped tests (e.g. @Disabled integration tests).
          effective = total - skipped
          if effective <= 0:
              pass_rate = 0.0
          else:
              pass_rate = ((effective - failures - errors) * 100.0) / effective

          gate = 'pass' if pass_rate >= 85.0 else 'fail'

          print(f'reports           : {len(reports)}')
          print(f'total tests       : {total}')
          print(f'failures          : {failures}')
          print(f'errors            : {errors}')
          print(f'skipped           : {skipped}')
          print(f'effective (run)   : {effective}')
          print(f'pass_rate         : {pass_rate:.2f}%')
          print(f'gate              : {gate}')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fp:
              fp.write(f'total={total}\n')
              fp.write(f'failures={failures}\n')
              fp.write(f'errors={errors}\n')
              fp.write(f'skipped={skipped}\n')
              fp.write(f'pass_rate={pass_rate:.2f}\n')
              fp.write(f'gate={gate}\n')
          PY

      - name: Enforce 85% pass-rate gate
        if: steps.parse.outputs.gate != 'pass'
        run: |
          echo "::error title=Test gate failed::Pass rate ${PASS_RATE:-0}% < required 85% \
            (failures=${{ steps.parse.outputs.failures }}, \
            errors=${{ steps.parse.outputs.errors }}, \
            skipped=${{ steps.parse.outputs.skipped }}, \
            total=${{ steps.parse.outputs.total }})"
          exit 1

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-output
          path: target/test-output.log
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # JOB 2: Package the application (depends on the test gate).
  # ---------------------------------------------------------------------------
  build:
    name: Build JAR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build (skip tests, they already passed)
        run: ./mvnw -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-consumer-jar
          path: target/*.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # JOB 3: PLACEHOLDER - Build & publish a Docker image.
  # Will be implemented once the CI setup is finalized.
  # ---------------------------------------------------------------------------
  docker:
    name: Build Docker Image (placeholder)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Placeholder
        run: |
          echo "Docker image build & publish is not implemented yet."
          echo "This job is a placeholder for future CI work."
