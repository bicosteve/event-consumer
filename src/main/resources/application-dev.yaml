spring:
  application:
    name: event-consumer

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: ${H2DB}
#    username: sa
#    password:
#    driver-class-name: org.h2.Driver

#  h2:
#    console:
#      enabled: true
#      path: /h2-console
#      settings:
#        web-allow-others: false
#        trace: false

  sql:
    init:
      mode: ${DB_MODE}
      data-locations: classpath:schema.sql


  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /


app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE}
    queue: ${RABBITMQ_QUEUE}
    routing-key: ${RABBITMQ_ROUTING_KEY}

server:
  port: ${APP_PORT}


logging:
  level:
    org.springframework.jdbc: ${LOGGING_LEVEL}